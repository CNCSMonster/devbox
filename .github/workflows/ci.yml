name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq docker.io shellcheck
          sudo systemctl start docker

      - name: Smoke test
        run: bash tests/smoke.sh

      - name: Unit test
        run: bash tests/unit.sh

      - name: ShellCheck
        run: |
          shellcheck scripts/devbox
          shellcheck install.sh
          shellcheck tests/smoke.sh
          shellcheck tests/unit.sh
